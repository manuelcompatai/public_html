<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Store | compaTAI - High Density Chaos Data</title>
    
    <meta name="description" content="Purchase premium edge-case datasets for AI training. Mexico City high-density traffic chaos packs.">
    <link rel="icon" type="image/png" href="https://compatai.mx/assets/logo/Logo_compaTAI.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --nav-h: 64px; --red: #E60000; }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #0b0b0b;
            color: #fff;
            overflow: hidden;
        }
        a { text-decoration: none; color: inherit; }

        /* ── Navbar ── */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-h);
            z-index: 1000;
            background: rgba(0,0,0,0.15);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .nav-container {
            max-width: 1200px;
            height: 100%;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo { display: flex; align-items: center; }
        .nav-logo img {
            height: 38px; width: auto;
            filter: drop-shadow(0 0 6px rgba(0,0,0,0.5));
            transition: transform 0.25s ease, opacity 0.25s ease;
        }
        .nav-logo:hover img { transform: scale(1.06); opacity: 0.9; }

        .nav-links { list-style: none; display: flex; align-items: center; gap: 4px; }
        .nav-links a {
            display: inline-block;
            padding: 8px 14px;
            font-size: 0.875rem; font-weight: 600;
            color: rgba(255,255,255,0.82);
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
        }
        .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.07); }
        .nav-links a.active { color: var(--red); }
        .nav-links a.active::after {
            content: '';
            display: block;
            height: 2px; background: var(--red); border-radius: 2px;
            margin-top: 2px;
        }
        .nav-btn {
            background: var(--red) !important;
            color: #fff !important;
            padding: 9px 20px !important;
            border-radius: 50px !important;
            font-weight: 700 !important;
            margin-left: 8px;
            box-shadow: 0 2px 12px rgba(230,0,0,0.25);
        }
        .nav-btn:hover { background: #cc0000 !important; }
        .nav-btn::after { display: none !important; }

        /* ── Store layout ── */
        .store-wrapper {
            position: fixed;
            top: var(--nav-h); left: 0; right: 0; bottom: 0;
            background: #0b0b0b;
        }
        .iframe-container { width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* ── Loading overlay ── */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: #0b0b0b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            z-index: 50;
            transition: opacity 0.5s ease-out;
        }
        .loading-overlay.fade-out { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(230,0,0,0.1);
            border-top: 3px solid var(--red);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="iframe-page">

    <nav class="navbar">
        <div class="nav-container">
            <a href="https://compatai.mx" class="nav-logo">
                <img src="/assets/logo/compaTAI_logo_75x75.png" alt="compaTAI logo">
            </a>
            <ul class="nav-links">
                <li><a href="https://compatai.mx">Home</a></li>
                <li><a href="https://demo.compatai.mx">Live Demo</a></li>
                <li><a href="https://store.compatai.mx" class="active">Video Store</a></li>
                <li><a href="mailto:social.media@compatai.mx" class="nav-btn">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="store-wrapper">
        <div class="loading-overlay" id="loadingScreen">
            <img src="https://compatai.mx/assets/logo/Logo_compaTAI.png" alt="Logo" style="width: 80px; margin-bottom: 20px;">
            <p style="color: #E60000; font-weight: 600; font-size: 0.9rem; letter-spacing: 2px;">SECURE STORE CONNECTION...</p>
            <div class="spinner"></div>
        </div>

        <div class="iframe-container">
            <iframe 
                id="gumroad-iframe"
                src="https://compataiadmin.gumroad.com/" 
                title="compaTAI Store">
            </iframe>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('gumroad-iframe');
        const loading = document.getElementById('loadingScreen');

        iframe.onload = function() {
            setTimeout(() => {
                loading.classList.add('fade-out');
            }, 1000);
        };

        setTimeout(() => {
            loading.classList.add('fade-out');
        }, 5000);
    </script>
</body>
</html>
