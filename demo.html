<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Demo | compaTAI</title>
    
    <link rel="icon" type="image/png" href="https://compatai.mx/assets/logo/Logo_compaTAI.png">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000000; font-family: 'Inter', sans-serif;
        }
        .demo-wrapper {
            position: relative; 
            /* padding-top: 70px; <-- ELIMINA ESTA LÍNEA */ 
            height: 100vh;
            width: 100%; 
            display: flex; flex-direction: column;
        }
        .iframe-container { flex-grow: 1; width: 100%; background-color: #000000; }
        iframe { width: 100%; height: 100%; border: none; }
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 50;
            transition: opacity 0.5s ease-out;
        }
        .loading-overlay.fade-out { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(230, 0, 0, 0.1);
            border-top: 3px solid #E60000; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="iframe-page">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><img src="/assets/logo/compaTAI_logo_75x75.png" alt="logo"></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="demo.html" class="active">Live Demo</a></li>
                <li><a href="store.html">Dataset Store</a></li>
                <li><a href="mailto:hello@compatai.mx" class="nav-btn">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="demo-wrapper">
        <div class="loading-overlay" id="loadingScreen">
            <img src="https://compatai.mx/assets/logo/Logo_compaTAI.png" alt="Logo" style="width: 100px;">
            <p style="color: #E60000; font-weight: 700; margin-top: 20px; letter-spacing: 2px;">INITIALIZING ENGINE...</p>
            <div class="spinner"></div>
        </div>
        <div class="iframe-container">
            <iframe id="hf-iframe" src="https://manuelvaraletai-compatai-v1.hf.space"></iframe>
        </div>
    </div>
    <script>
        const iframe = document.getElementById('hf-iframe');
        const loading = document.getElementById('loadingScreen');
        iframe.onload = () => { setTimeout(() => loading.classList.add('fade-out'), 1000); };
        setTimeout(() => loading.classList.add('fade-out'), 8000);
    </script>
</body>
</html>
