name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H 52.44.87.36 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Read deploy script
        run: ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no ubuntu@52.44.87.36 "cat ~/deploy_web.sh"

      - name: Run deploy script
        run: ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no ubuntu@52.44.87.36 "bash ~/deploy_web.sh 2>&1; echo EXITCODE=$?"

      - name: Show nginx root and dist
        run: ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no ubuntu@52.44.87.36 "grep -r 'root ' /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null; find /home/ubuntu -name 'index.html' 2>/dev/null | head -10"
