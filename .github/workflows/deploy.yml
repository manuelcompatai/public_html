name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          echo "Key lines: $(wc -l < ~/.ssh/ec2_deploy_key)"
          echo "Key first line: $(head -1 ~/.ssh/ec2_deploy_key)"
          echo "Key last line: $(tail -1 ~/.ssh/ec2_deploy_key)"
          ssh-keyscan -H 52.44.87.36 >> ~/.ssh/known_hosts 2>/dev/null
          echo "known_hosts entries: $(wc -l < ~/.ssh/known_hosts)"

      - name: Test SSH connection
        run: ssh -i ~/.ssh/ec2_deploy_key -v -o StrictHostKeyChecking=no ubuntu@52.44.87.36 "echo connected && cat ~/deploy_web.sh" 2>&1 | tail -30

      - name: Git pull on EC2
        run: ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no ubuntu@52.44.87.36 "bash ~/deploy_web.sh"

      - name: Configure nginx for React SPA
        run: ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no ubuntu@52.44.87.36 "find /home/ubuntu /var/www -name fix_nginx.sh 2>/dev/null | head -1 | xargs bash"
