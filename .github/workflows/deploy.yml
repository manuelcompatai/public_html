name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 52.44.87.36
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: ~/deploy_web.sh

      - name: Configure nginx for React SPA
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 52.44.87.36
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: find /home/ubuntu /var/www -name "fix_nginx.sh" 2>/dev/null | head -1 | xargs bash
