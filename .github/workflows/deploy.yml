name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H 52.44.87.36 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Diagnose and deploy
        run: |
          ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no ubuntu@52.44.87.36 "
            echo '=== deploy_web.sh ===' && cat ~/deploy_web.sh
            echo '=== running deploy_web.sh ===' && bash ~/deploy_web.sh ; echo exit=$?
            echo '=== nginx config ===' && sudo nginx -T 2>/dev/null | grep -E 'server_name|root ' | head -20
            echo '=== find dist ===' && find /home/ubuntu /var/www -name dist -type d 2>/dev/null | head -5
          "
